<!DOCTYPE html>
<html>
<head>
<title>Love Question</title>

<style>
body {
    background-image: url(bg1.png);
    background-size: cover;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: rgb(193, 160, 77);

}

.box {
    width: 400px;
    height: 300px;
    border: 2px solid black;
    border-radius: 15px;
    background-color: rgba(36, 22, 22, 0.8);
    

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

.name {
    display: flex;
    align-items: center;
    gap: 10px;
}

.name label,
.name input {
    color: rgb(202, 162, 69);
}

.question {
    margin-top: 30px;
    text-align: center;
}

button {
    margin: 5px;
    padding: 8px 15px;
}
</style>

</head>

<body>

<div class="box">

    <div class="name">
        <label>Enter your name</label>
        <input type="text">
    </div>

    <div class="question">
        <p>Do you love me?</p>

        <button onclick="yes()">yes</button>
        <button onclick="no()">no</button>
    </div>

</div>


<script>

function yes(){
    window.location.href="letter2.html";
}


// Different alert each time
let messages = [
    "You clicked it by mistake, try again! 😅",
    "HAHA you did it again love",
    "...",
    "You are mad at me? 😢",
];

let count = 0;

function no(){
    alert(messages[count % messages.length]);
    count++;
}

</script>

</body>
</html>
